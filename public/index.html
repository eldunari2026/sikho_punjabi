<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sikho Punjabi — Content Review</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
  :root {
    --bg:#0f1117; --surface:#1a1d27; --surface2:#22253a; --border:#2d3148;
    --text:#e2e8f0; --text-muted:#94a3b8; --gurmukhi:#f1c40f; --roman:#93c5fd;
    --english:#cbd5e1; --accent:#6366f1; --retain:#22c55e; --remove:#ef4444;
    --edit:#f59e0b; --move:#8b5cf6; --badge-bg:rgba(255,255,255,0.08);
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
  }

  button, input, select, textarea { font: inherit; }
  button { cursor: pointer; }
  [hidden] { display: none !important; }

  .no-access {
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 22px;
  }

  .no-access-box {
    width: min(560px, 100%);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 26px;
    background: var(--surface);
    color: var(--text-muted);
    line-height: 1.6;
  }

  .no-access-box h1 {
    margin: 0 0 10px;
    color: var(--text);
    font-size: 1.25rem;
    letter-spacing: 0;
  }

  .app-header {
    position: sticky;
    top: 0;
    z-index: 50;
    background: rgba(15, 17, 23, 0.96);
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(12px);
  }

  .header-main {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 18px;
    padding: 16px 22px 12px;
  }

  h1 {
    margin: 0;
    font-size: clamp(1.05rem, 2vw, 1.45rem);
    letter-spacing: 0;
  }

  .header-side {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    flex-wrap: wrap;
    gap: 10px 14px;
  }

  .reviewer-badge {
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 6px 10px;
    background: var(--surface);
    color: var(--text);
    font-size: 0.85rem;
    white-space: nowrap;
  }

  .stats-bar {
    color: var(--text-muted);
    font-size: 0.9rem;
    white-space: nowrap;
  }

  .save-status {
    min-width: 116px;
    color: var(--roman);
    font-size: 0.85rem;
    text-align: right;
  }

  .save-status.error { color: var(--remove); }

  .test-toggle {
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 7px 11px;
    background: var(--surface);
    color: var(--text);
  }

  .test-panel {
    display: none;
    margin: 0 22px 14px;
    padding: 12px 14px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--surface);
    color: var(--text-muted);
    font-size: 0.9rem;
    line-height: 1.7;
  }

  .test-panel.open { display: block; }
  .test-panel .ok { color: var(--retain); }
  .test-panel .warn { color: var(--edit); }
  .test-panel .err { color: var(--remove); }

  .tabs {
    display: flex;
    gap: 6px;
    padding: 0 22px;
    overflow-x: auto;
  }

  .tab-button {
    border: 0;
    border-bottom: 3px solid transparent;
    padding: 11px 14px 10px;
    background: transparent;
    color: var(--text-muted);
    white-space: nowrap;
  }

  .tab-button.active {
    color: var(--text);
    border-bottom-color: var(--accent);
  }

  main { padding: 22px; }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  .stream-selector,
  .controls-bar {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 18px;
  }

  .pill,
  .chip {
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 7px 12px;
    background: var(--surface);
    color: var(--text-muted);
    line-height: 1.1;
  }

  .pill.active,
  .chip.active {
    border-color: var(--accent);
    background: var(--surface2);
    color: var(--text);
  }

  .search-input {
    width: min(420px, 100%);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 10px 12px;
    background: var(--surface);
    color: var(--text);
  }

  .search-input:focus,
  select:focus,
  textarea:focus {
    outline: 2px solid rgba(99, 102, 241, 0.35);
    outline-offset: 1px;
    border-color: var(--accent);
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(min(100%, 340px), 1fr));
    gap: 16px;
  }

  .content-card {
    position: relative;
    display: flex;
    flex-direction: column;
    gap: 13px;
    min-width: 0;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    background: var(--surface);
  }

  .decision-dot {
    position: absolute;
    top: 13px;
    right: 13px;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #64748b;
    box-shadow: 0 0 0 3px rgba(255,255,255,0.04);
  }

  .decision-dot.retain { background: var(--retain); }
  .decision-dot.remove { background: var(--remove); }
  .decision-dot.edit { background: var(--edit); }
  .decision-dot.move { background: var(--move); }

  .card-header {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 7px;
    padding-right: 18px;
  }

  .badge,
  .tag-chip {
    display: inline-flex;
    align-items: center;
    min-height: 22px;
    border-radius: 999px;
    padding: 3px 8px;
    background: var(--badge-bg);
    color: var(--text-muted);
    font-size: 0.78rem;
    line-height: 1.2;
  }

  .id-badge {
    color: var(--roman);
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  }

  .card-title {
    margin: 2px 0 0;
    font-size: 1.25rem;
    line-height: 1.25;
    letter-spacing: 0;
  }

  .muted {
    color: var(--text-muted);
    font-size: 0.92rem;
    line-height: 1.45;
  }

  .gurmukhi {
    color: var(--gurmukhi);
    font-size: 1.3em;
    line-height: 1.75;
    white-space: pre-wrap;
    overflow-wrap: anywhere;
  }

  .first-line { font-size: 1.4em; }

  .roman {
    color: var(--roman);
    line-height: 1.65;
    white-space: pre-wrap;
    overflow-wrap: anywhere;
  }

  .english {
    color: var(--english);
    line-height: 1.6;
    white-space: pre-wrap;
    overflow-wrap: anywhere;
  }

  .centered { text-align: center; }

  .large-text {
    font-size: 1.65rem;
    font-weight: 700;
  }

  .excerpt-toggle,
  .master-toggle {
    align-self: flex-start;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 7px 10px;
    background: var(--surface2);
    color: var(--text);
  }

  .excerpt-body {
    display: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 13px;
    background: rgba(15, 17, 23, 0.55);
  }

  .excerpt-body.open {
    display: grid;
    gap: 11px;
  }

  .callout {
    border-left: 3px solid var(--accent);
    border-radius: 6px;
    padding: 11px 12px;
    background: rgba(255,255,255,0.035);
    color: var(--text-muted);
    font-style: italic;
    line-height: 1.55;
  }

  .chip-row {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 7px;
  }

  .feedback-widget {
    display: grid;
    gap: 9px;
    margin-top: auto;
    padding-top: 13px;
    border-top: 1px solid var(--border);
  }

  .feedback-widget select,
  .feedback-widget textarea {
    width: 100%;
    border: 1px solid var(--border);
    border-radius: 7px;
    background: var(--bg);
    color: var(--text);
  }

  .feedback-widget select { padding: 9px 10px; }

  .feedback-widget textarea {
    min-height: 66px;
    padding: 10px;
    resize: vertical;
  }

  .master-panel {
    display: grid;
    gap: 9px;
    padding-top: 2px;
  }

  .master-reviews {
    display: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 11px 12px;
    background: rgba(15, 17, 23, 0.45);
    color: var(--text-muted);
    font-size: 0.9rem;
    line-height: 1.55;
  }

  .master-reviews.open { display: grid; gap: 8px; }
  .master-reviewer { color: var(--text); }

  .loader,
  .message {
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
    background: var(--surface);
    color: var(--text-muted);
  }

  .loader {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .spinner {
    width: 18px;
    height: 18px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  .hidden { display: none !important; }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 760px) {
    .header-main {
      align-items: flex-start;
      flex-direction: column;
    }

    .header-side { justify-content: flex-start; }
    .stats-bar { white-space: normal; }
    .save-status { text-align: left; }
    main { padding: 16px; }
  }
</style>
</head>
<body>
<div id="noAccess" class="no-access" hidden>
  <div class="no-access-box">
    <h1>No access</h1>
    <div>Use your reviewer link to access this tool. If you need access, contact Arjun.</div>
  </div>
</div>

<div id="app" hidden>
  <header class="app-header">
    <div class="header-main">
      <h1>Sikho Punjabi — Content Review</h1>
      <div class="header-side">
        <div id="reviewerBadge" class="reviewer-badge"></div>
        <div id="statsBar" class="stats-bar">0 retained / 0 removed / 0 flagged / 0 total reviewed</div>
        <div id="saveStatus" class="save-status" aria-live="polite"></div>
        <button id="testToggle" class="test-toggle" type="button" aria-expanded="false">Test Panel</button>
      </div>
    </div>
    <div id="testPanel" class="test-panel" aria-live="polite"></div>
    <nav class="tabs" aria-label="Review sections">
      <button class="tab-button active" type="button" data-tab="streams">Cultural Streams</button>
      <button class="tab-button" type="button" data-tab="vocab">Vocab</button>
      <button class="tab-button" type="button" data-tab="proverbs">Proverbs</button>
    </nav>
  </header>

  <main>
    <section id="streamsTab" class="tab-panel active" aria-label="Cultural Streams">
      <div id="streamSelector" class="stream-selector"></div>
      <div id="streamsContent"><div class="loader"><span class="spinner"></span>Loading cultural streams...</div></div>
    </section>

    <section id="vocabTab" class="tab-panel" aria-label="Vocab">
      <div class="controls-bar">
        <input id="vocabSearch" class="search-input" type="search" placeholder="Search Gurmukhi or English...">
        <div id="sourceFilters" class="stream-selector" aria-label="Source filters"></div>
      </div>
      <div id="vocabContent"><div class="loader"><span class="spinner"></span>Loading vocab...</div></div>
    </section>

    <section id="proverbsTab" class="tab-panel" aria-label="Proverbs">
      <div class="controls-bar">
        <input id="proverbsSearch" class="search-input" type="search" placeholder="Search Gurmukhi or English...">
      </div>
      <div id="proverbsContent"><div class="loader"><span class="spinner"></span>Loading proverbs...</div></div>
    </section>
  </main>
</div>

<script>
  const SUPABASE_URL = 'https://aqmdxhrhvjxvdubvfzlj.supabase.co'
  const SUPABASE_ANON_KEY = 'SUPABASE_ANON_KEY_PLACEHOLDER'
  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

  const streamConfig = [
    { key: "s1", code: "S1", label: "Gurbani" },
    { key: "s2", code: "S2", label: "Sufi/Kafi" },
    { key: "s3", code: "S3", label: "Kissa" },
    { key: "s4", code: "S4", label: "Medieval" },
    { key: "s5", code: "S5", label: "Modern Lit" },
    { key: "s6", code: "S6", label: "Folk/Lok Geet" },
    { key: "s7", code: "S7", label: "Boliyan" },
    { key: "s8", code: "S8", label: "Songs" },
    { key: "s9", code: "S9", label: "Dasam Granth" }
  ];
  const sourceOptions = ["all", "discoversikhism", "learnpunjabi", "elearnpunjabi", "omniglot", "wiktionary"];
  const actionClasses = ["retain", "remove", "edit", "move"];
  const tabMap = {
    streams: document.getElementById("streamsTab"),
    vocab: document.getElementById("vocabTab"),
    proverbs: document.getElementById("proverbsTab")
  };

  let currentToken = "";
  let reviewerName = "";
  let reviewerRole = "reviewer";
  let streamsData = {};
  let vocabData = [];
  let proverbsData = [];
  let feedbackState = {};
  let allFeedback = {};
  let activeStream = "s1";
  let activeSource = "all";
  let saveTimer = null;
  let savedClearTimer = null;
  let pendingSaves = {};
  let testResults = [];

  window.feedbackState = feedbackState;
  window.allFeedback = allFeedback;

  function esc(value) {
    if (value === null || value === undefined) return "";
    return String(value)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#39;");
  }

  function normalize(value) {
    return String(value || "").toLowerCase();
  }

  function itemId(item) {
    return item && item.id ? String(item.id) : "";
  }

  function romanReadable(item) {
    if (!item) return "";
    if (item.roman && typeof item.roman === "object" && item.roman.readable) return item.roman.readable;
    return item.roman_readable || item.romanization || "";
  }

  function sourceForItem(item) {
    if (!item) return "";
    if (item.source) return String(item.source);
    const tags = Array.isArray(item.tags) ? item.tags : [];
    return sourceOptions.find(source => source !== "all" && tags.includes(source)) || "";
  }

  function fieldLine(parts) {
    const clean = parts.filter(Boolean);
    return clean.length ? `<div class="muted">${clean.map(esc).join(" / ")}</div>` : "";
  }

  function badge(value, cls = "") {
    return value ? `<span class="badge ${cls}">${esc(value)}</span>` : "";
  }

  function renderFeedbackWidget(id) {
    return `
      <div class="feedback-widget" data-feedback-for="${esc(id)}">
        <select data-role="action" aria-label="Review action for ${esc(id)}">
          <option value="">No action</option>
          <option value="retain">retain</option>
          <option value="remove">remove</option>
          <option value="edit">edit</option>
          <option value="move">move</option>
        </select>
        <textarea data-role="comment" rows="2" placeholder="Comment (optional)..." aria-label="Comment for ${esc(id)}"></textarea>
      </div>
    `;
  }

  function renderMasterPanel(id) {
    if (reviewerRole !== "master") return "";
    const reviews = allFeedback[id] || [];
    const reviewHtml = reviews.length
      ? reviews.map(review => {
          const action = review.action || "No action";
          const comment = review.comment || "(no comment)";
          return `<div><span class="master-reviewer">${esc(review.reviewer_name || "Unknown")}</span>: ${esc(action)} — ${esc(comment)}</div>`;
        }).join("")
      : `<div>No reviews yet.</div>`;
    return `
      <div class="master-panel">
        <button class="master-toggle" type="button" aria-expanded="false">All reviews (${reviews.length})</button>
        <div class="master-reviews">${reviewHtml}</div>
      </div>
    `;
  }

  function renderCardShell(id, searchText, body, extraAttrs = "") {
    return `
      <article class="content-card" data-id="${esc(id)}" data-search="${esc(normalize(searchText))}" ${extraAttrs}>
        <span class="decision-dot" data-dot-for="${esc(id)}"></span>
        ${body}
        ${renderFeedbackWidget(id)}
        ${renderMasterPanel(id)}
      </article>
    `;
  }

  function renderStreams() {
    const selector = document.getElementById("streamSelector");
    selector.innerHTML = streamConfig.map(stream => `
      <button class="pill ${stream.key === activeStream ? "active" : ""}" type="button" data-stream="${stream.key}">
        ${stream.code}: ${esc(stream.label)}
      </button>
    `).join("");

    const items = streamsData[activeStream] || [];
    document.getElementById("streamsContent").innerHTML = items.length
      ? `<div class="grid">${items.map(renderStreamCard).join("")}</div>`
      : `<div class="message">No items found for this stream.</div>`;
    applyFeedbackToWidgets();
  }

  function renderStreamCard(item) {
    const id = itemId(item);
    const stream = streamConfig.find(s => s.key === activeStream) || {};
    const header = `
      <div class="card-header">
        ${badge(id, "id-badge")}
        ${badge(stream.code || activeStream.toUpperCase())}
        ${badge(item.form)}
        ${badge(item.register)}
      </div>
    `;
    const title = item.title ? `<h2 class="card-title">${esc(item.title)}</h2>` : "";
    const source = fieldLine([item.author, item.source_bani, item.source_granth, item.ang_or_location]);
    const firstLine = item.first_line_gurmukhi ? `<div class="gurmukhi first-line">${esc(item.first_line_gurmukhi)}</div>` : "";
    const excerpt = (item.full_excerpt_gurmukhi || item.romanization || item.english_meaning) ? `
      <button class="excerpt-toggle" type="button" aria-expanded="false">Show full excerpt ▼</button>
      <div class="excerpt-body">
        ${item.full_excerpt_gurmukhi ? `<div class="gurmukhi">${esc(item.full_excerpt_gurmukhi)}</div>` : ""}
        ${item.romanization ? `<div class="roman">${esc(item.romanization)}</div>` : ""}
        ${item.english_meaning ? `<div class="english">${esc(item.english_meaning)}</div>` : ""}
      </div>
    ` : "";
    const why = item.why_dense ? `<div class="callout">${esc(item.why_dense)}</div>` : "";
    const searchText = [item.title, item.first_line_gurmukhi, item.full_excerpt_gurmukhi, item.english_meaning, item.author, item.source_bani, item.source_granth].join(" ");
    return renderCardShell(id, searchText, header + title + source + firstLine + excerpt + why);
  }

  function renderVocab() {
    document.getElementById("sourceFilters").innerHTML = sourceOptions.map(source => `
      <button class="chip ${source === activeSource ? "active" : ""}" type="button" data-source="${source}">${esc(source === "all" ? "All" : source)}</button>
    `).join("");

    document.getElementById("vocabContent").innerHTML = vocabData.length
      ? `<div class="grid">${vocabData.map(renderVocabCard).join("")}</div>`
      : `<div class="message">No vocab items found.</div>`;
    applyFeedbackToWidgets();
    filterVocab();
  }

  function renderVocabCard(item) {
    const id = itemId(item);
    const tags = Array.isArray(item.tags) ? item.tags : [];
    const tagHtml = tags.map(tag => `<span class="tag-chip">${esc(tag)}</span>`).join("");
    const readable = romanReadable(item);
    const body = `
      ${item.gurmukhi ? `<div class="gurmukhi large-text centered">${esc(item.gurmukhi)}</div>` : ""}
      ${readable ? `<div class="roman centered">${esc(readable)}</div>` : ""}
      ${item.english ? `<div class="english centered">${esc(item.english)}</div>` : ""}
      <div class="chip-row">
        ${badge(item.part_of_speech)}
        ${tagHtml}
      </div>
    `;
    return renderCardShell(
      id,
      `${item.gurmukhi || ""} ${item.english || ""}`,
      body,
      `data-source="${esc(sourceForItem(item))}"`
    );
  }

  function renderProverbs() {
    document.getElementById("proverbsContent").innerHTML = proverbsData.length
      ? `<div class="grid">${proverbsData.map(renderProverbCard).join("")}</div>`
      : `<div class="message">No proverbs found.</div>`;
    applyFeedbackToWidgets();
    filterProverbs();
  }

  function renderProverbCard(item) {
    const id = itemId(item);
    const readable = romanReadable(item);
    const body = `
      ${item.gurmukhi ? `<div class="gurmukhi large-text centered">${esc(item.gurmukhi)}</div>` : ""}
      ${readable ? `<div class="roman centered">${esc(readable)}</div>` : ""}
      ${item.english ? `<div class="english centered">${esc(item.english)}</div>` : ""}
      ${item.cultural_note ? `<div class="muted centered"><em>${esc(item.cultural_note)}</em></div>` : ""}
      <div class="chip-row">
        ${item.selection_theme ? `<span class="tag-chip">${esc(item.selection_theme)}</span>` : ""}
      </div>
    `;
    return renderCardShell(id, `${item.gurmukhi || ""} ${item.english || ""}`, body);
  }

  function applyFeedbackToWidgets() {
    document.querySelectorAll(".feedback-widget").forEach(widget => {
      const id = widget.dataset.feedbackFor;
      const state = feedbackState[id] || {};
      widget.querySelector('[data-role="action"]').value = state.action || "";
      widget.querySelector('[data-role="comment"]').value = state.comment || "";
      updateCardDot(id, state.action || "");
    });
    updateStats();
  }

  function updateCardDot(id, action) {
    document.querySelectorAll(`[data-dot-for="${CSS.escape(id)}"]`).forEach(dot => {
      dot.classList.remove(...actionClasses);
      if (actionClasses.includes(action)) dot.classList.add(action);
    });
  }

  function onFeedbackInput(event) {
    const widget = event.target.closest(".feedback-widget");
    if (!widget) return;

    const id = widget.dataset.feedbackFor;
    const action = widget.querySelector('[data-role="action"]').value;
    const comment = widget.querySelector('[data-role="comment"]').value;
    feedbackState[id] = { action, comment };
    pendingSaves[id] = { action, comment };
    updateCardDot(id, action);
    updateStats();
    scheduleSave();
  }

  function scheduleSave() {
    clearTimeout(saveTimer);
    setSaveStatus("Saving...");
    saveTimer = setTimeout(savePendingFeedback, 1000);
  }

  async function savePendingFeedback() {
    const rows = Object.entries(pendingSaves).map(([id, entry]) => ({
      reviewer_token: currentToken,
      reviewer_name: reviewerName,
      item_id: id,
      action: entry.action || "",
      comment: entry.comment || "",
      updated_at: new Date().toISOString()
    }));
    if (!rows.length) return;

    try {
      const { error } = await sb.from('feedback').upsert(rows, { onConflict: 'reviewer_token,item_id' });
      if (error) throw error;
      rows.forEach(row => { delete pendingSaves[row.item_id]; });
      showSaved();
      addTestResult("ok", `Saved feedback for ${rows.length} item${rows.length === 1 ? "" : "s"}`);
    } catch (error) {
      setSaveStatus("Save failed — check connection", true);
      addTestResult("err", `Feedback save failed: ${error.message || error}`);
      renderTestPanel();
    }
  }

  function setSaveStatus(text, isError = false) {
    const status = document.getElementById("saveStatus");
    clearTimeout(savedClearTimer);
    status.textContent = text;
    status.classList.toggle("error", isError);
  }

  function showSaved() {
    const status = document.getElementById("saveStatus");
    clearTimeout(savedClearTimer);
    status.textContent = "Saved ✓";
    status.classList.remove("error");
    savedClearTimer = setTimeout(() => { status.textContent = ""; }, 2000);
  }

  function updateStats() {
    const counts = { retain: 0, remove: 0, edit: 0, move: 0 };
    Object.values(feedbackState).forEach(entry => {
      const action = entry && entry.action;
      if (Object.prototype.hasOwnProperty.call(counts, action)) counts[action] += 1;
    });
    const flagged = counts.edit + counts.move;
    const totalReviewed = counts.retain + counts.remove + counts.edit + counts.move;
    document.getElementById("statsBar").textContent =
      `${counts.retain} retained / ${counts.remove} removed / ${flagged} flagged / ${totalReviewed} total reviewed`;
  }

  function filterVocab() {
    const query = normalize(document.getElementById("vocabSearch").value);
    document.querySelectorAll("#vocabContent .content-card").forEach(card => {
      const matchesText = !query || card.dataset.search.includes(query);
      const matchesSource = activeSource === "all" || card.dataset.source === activeSource;
      card.classList.toggle("hidden", !(matchesText && matchesSource));
    });
  }

  function filterProverbs() {
    const query = normalize(document.getElementById("proverbsSearch").value);
    document.querySelectorAll("#proverbsContent .content-card").forEach(card => {
      card.classList.toggle("hidden", Boolean(query) && !card.dataset.search.includes(query));
    });
  }

  function addTestResult(kind, text) {
    testResults.push({ kind, text });
  }

  function renderTestPanel() {
    const panel = document.getElementById("testPanel");
    panel.innerHTML = testResults.length
      ? testResults.map(result => `<div class="${result.kind}">${esc(result.text)}</div>`).join("")
      : `<div class="warn">Loading validation results...</div>`;
  }

  function countStreamItems(streams) {
    return Object.values(streams || {}).reduce((sum, items) => sum + (Array.isArray(items) ? items.length : 0), 0);
  }

  async function fetchJson(url) {
    const response = await fetch(url);
    if (!response.ok) {
      const error = new Error(`HTTP ${response.status}`);
      error.status = response.status;
      throw error;
    }
    return response.json();
  }

  function readToken() {
    const params = new URLSearchParams(window.location.search);
    const urlToken = params.get("token");
    if (urlToken) {
      localStorage.setItem("review_token", urlToken);
      params.delete("token");
      const query = params.toString();
      const cleanUrl = `${window.location.pathname}${query ? `?${query}` : ""}${window.location.hash}`;
      history.replaceState({}, document.title, cleanUrl);
      return urlToken;
    }
    return localStorage.getItem("review_token") || "";
  }

  async function verifyToken() {
    currentToken = readToken();
    if (!currentToken) return false;
    const reviewers = await fetchJson("/reviewers.json");
    const reviewer = reviewers && reviewers[currentToken];
    if (!reviewer) return false;
    reviewerName = reviewer.name || "Reviewer";
    reviewerRole = reviewer.role === "master" ? "master" : "reviewer";
    return true;
  }

  function showNoAccess() {
    document.getElementById("app").hidden = true;
    document.getElementById("noAccess").hidden = false;
  }

  function showApp() {
    document.getElementById("noAccess").hidden = true;
    document.getElementById("app").hidden = false;
    document.getElementById("reviewerBadge").textContent = `Reviewing as ${reviewerName}`;
  }

  async function loadReviewerFeedback() {
    const { data, error } = await sb.from('feedback')
      .select('item_id, action, comment')
      .eq('reviewer_token', currentToken);
    if (error) throw error;

    feedbackState = {};
    (data || []).forEach(row => {
      if (row.item_id) feedbackState[row.item_id] = { action: row.action || "", comment: row.comment || "" };
    });
    window.feedbackState = feedbackState;
    return data || [];
  }

  async function loadAllFeedback() {
    const { data, error } = await sb.from('feedback')
      .select('reviewer_name, item_id, action, comment');
    if (error) throw error;

    allFeedback = {};
    (data || []).forEach(row => {
      if (!row.item_id) return;
      if (!allFeedback[row.item_id]) allFeedback[row.item_id] = [];
      allFeedback[row.item_id].push({
        reviewer_name: row.reviewer_name || "Unknown",
        action: row.action || "",
        comment: row.comment || ""
      });
    });
    window.allFeedback = allFeedback;
    return data || [];
  }

  async function loadDataAndFeedback() {
    const dataPromises = [
      fetchJson("/data/streams.json"),
      fetchJson("/data/vocab.json"),
      fetchJson("/data/proverbs.json")
    ];
    const feedbackPromises = [loadReviewerFeedback()];
    if (reviewerRole === "master") feedbackPromises.push(loadAllFeedback());

    const [streamsResult, vocabResult, proverbsResult, reviewerFeedbackResult, allFeedbackResult] =
      await Promise.allSettled([...dataPromises, ...feedbackPromises]);

    if (streamsResult.status === "fulfilled") {
      streamsData = streamsResult.value || {};
      addTestResult("ok", `Streams loaded: ${countStreamItems(streamsData)} items across ${streamConfig.length} streams`);
    } else {
      addTestResult("err", `Streams error: ${streamsResult.reason.message}`);
      document.getElementById("streamsContent").innerHTML = `<div class="message">Unable to load streams.</div>`;
    }

    if (vocabResult.status === "fulfilled") {
      vocabData = Array.isArray(vocabResult.value) ? vocabResult.value : [];
      addTestResult("ok", `Vocab loaded: ${vocabData.length} items`);
    } else {
      addTestResult("err", `Vocab error: ${vocabResult.reason.message}`);
      document.getElementById("vocabContent").innerHTML = `<div class="message">Unable to load vocab.</div>`;
    }

    if (proverbsResult.status === "fulfilled") {
      proverbsData = Array.isArray(proverbsResult.value) ? proverbsResult.value : [];
      addTestResult("ok", `Proverbs loaded: ${proverbsData.length} items`);
    } else {
      addTestResult("err", `Proverbs error: ${proverbsResult.reason.message}`);
      document.getElementById("proverbsContent").innerHTML = `<div class="message">Unable to load proverbs.</div>`;
    }

    if (reviewerFeedbackResult.status === "fulfilled") {
      addTestResult("ok", `Reviewer feedback loaded: ${Object.keys(feedbackState).length} items with decisions`);
    } else {
      addTestResult("err", `Reviewer feedback error: ${reviewerFeedbackResult.reason.message || reviewerFeedbackResult.reason}`);
    }

    if (reviewerRole === "master") {
      if (allFeedbackResult && allFeedbackResult.status === "fulfilled") {
        addTestResult("ok", `All feedback loaded: ${Object.values(allFeedback).reduce((sum, rows) => sum + rows.length, 0)} reviews`);
      } else if (allFeedbackResult) {
        addTestResult("err", `All feedback error: ${allFeedbackResult.reason.message || allFeedbackResult.reason}`);
      }
    }

    if (streamsResult.status === "fulfilled") renderStreams();
    if (vocabResult.status === "fulfilled") renderVocab();
    if (proverbsResult.status === "fulfilled") renderProverbs();
    applyFeedbackToWidgets();
    renderTestPanel();
  }

  function bindEvents() {
    document.querySelector(".tabs").addEventListener("click", event => {
      const button = event.target.closest(".tab-button");
      if (!button) return;
      document.querySelectorAll(".tab-button").forEach(tab => tab.classList.toggle("active", tab === button));
      Object.entries(tabMap).forEach(([key, panel]) => panel.classList.toggle("active", key === button.dataset.tab));
    });

    document.getElementById("testToggle").addEventListener("click", event => {
      const panel = document.getElementById("testPanel");
      panel.classList.toggle("open");
      event.currentTarget.setAttribute("aria-expanded", String(panel.classList.contains("open")));
    });

    document.getElementById("streamSelector").addEventListener("click", event => {
      const button = event.target.closest("[data-stream]");
      if (!button) return;
      activeStream = button.dataset.stream;
      renderStreams();
    });

    document.getElementById("sourceFilters").addEventListener("click", event => {
      const button = event.target.closest("[data-source]");
      if (!button) return;
      activeSource = button.dataset.source;
      document.querySelectorAll("#sourceFilters .chip").forEach(chip => chip.classList.toggle("active", chip === button));
      filterVocab();
    });

    document.addEventListener("click", event => {
      const excerptButton = event.target.closest(".excerpt-toggle");
      if (excerptButton) {
        const body = excerptButton.nextElementSibling;
        const isOpen = body.classList.toggle("open");
        excerptButton.setAttribute("aria-expanded", String(isOpen));
        excerptButton.textContent = isOpen ? "Hide full excerpt ▲" : "Show full excerpt ▼";
        return;
      }

      const masterButton = event.target.closest(".master-toggle");
      if (masterButton) {
        const body = masterButton.nextElementSibling;
        const isOpen = body.classList.toggle("open");
        masterButton.setAttribute("aria-expanded", String(isOpen));
      }
    });

    document.addEventListener("change", onFeedbackInput);
    document.addEventListener("input", event => {
      if (event.target.matches("#vocabSearch")) filterVocab();
      if (event.target.matches("#proverbsSearch")) filterProverbs();
      if (event.target.closest(".feedback-widget")) onFeedbackInput(event);
    });
  }

  document.addEventListener("DOMContentLoaded", async () => {
    bindEvents();
    renderTestPanel();
    try {
      const ok = await verifyToken();
      if (!ok) {
        showNoAccess();
        return;
      }
      showApp();
      addTestResult("ok", `Authenticated reviewer: ${reviewerName} (${reviewerRole})`);
      renderTestPanel();
      await loadDataAndFeedback();
    } catch (error) {
      addTestResult("err", `Startup error: ${error.message || error}`);
      renderTestPanel();
      showNoAccess();
    }
  });
</script>
</body>
</html>
